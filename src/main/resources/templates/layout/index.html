<!DOCTYPE html>
<html th:fragment="layout(title, content)" xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title th:replace="${title}">Layout Title</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
<div class="d-flex">
    <!-- Desktop sidebar -->
    <div class="d-none d-md-block" th:replace="~{layout/sidebar :: sidebar-fragment}"></div>

    <main class="flex-grow-1">
        <header class="bg-body-tertiary border-bottom p-3">
            <h1 class="h4 mb-0">My Page</h1>
        </header>

        <div class="container-fluid py-3" th:replace="${content}">
            <p>Page content</p>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
