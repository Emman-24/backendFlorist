<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="form_fields(formActionUrl)">

    <form class="p-3"
          method="POST"
          th:action="${formActionUrl}"
          th:object="${productCreateRequest}"
          enctype="multipart/form-data">

        <div class="row g-3">
            <div class="col-md-6">
                <label for="title" class="form-label">Title</label>
                <input class="form-control" id="title" th:field="*{text}" type="text">
            </div>
            <div class="col-md-6">
                <label for="route" class="form-label">Product Route</label>
                <input class="form-control" id="route" th:field="*{route}" type="text">
            </div>
        </div>

        <div class="row g-3 mt-1">
            <div class="col-md-6">
                <label for="category" class="form-label">Category</label>

                <select  id="category" th:field="*{categoryId}" class="form-select">
                    <option value="1" disabled selected>Select a category</option>
                    <option th:each="cat:${categoriesForDropdown}"
                            th:value="${cat.id}"
                            th:text="${cat.text}">
                        Category Name
                    </option>
                </select>
            </div>

            <div class="col-md-6">
                <label for="subCategory" class="form-label">SubCategory</label>
                <select  id="subCategory" th:field="*{subCategoryId}" class="form-select">
                    <option value="1" disabled selected>Select a category</option>
                    <option th:each="cat:${subcategoriesForDropdown}"
                            th:value="${cat.id}"
                            th:text="${cat.text}">
                        Category Name
                    </option>
                </select>
            </div>

        </div>

        <div class="row g-3 mt-1">
            <div class="col-md-12">
                <label for="tags" class="form-label">Tags</label>
                <select id="tags" th:field="*{tagIds}" class="form-select" multiple>
                    <option th:each="tag : ${tagsForDropdown}"
                            th:value="${tag.id}"
                            th:text="${tag.text}">
                        Tag Name
                    </option>
                </select>
                <div class="form-text">Hold Ctrl/Command to select multiple tags.</div>
            </div>
        </div>

        <div class="row g-3 mt-1">
            <div class="col-md-6">
                <label for="price" class="form-label">Price</label>
                <input class="form-control" id="price" type="number" th:field="*{price}" step="0.01" min="0">
            </div>
            <div class="col-md-6">
                <label for="myfile" class="form-label">Image</label>
                <input class="form-control"
                       id="myfile"
                       type="file"
                       name="file"
                       accept="image/png, image/jpeg, image/jpg, image/webp, image/avif">
            </div>
        </div>

        <div class="mt-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description"
                      rows="4"
                      th:field="*{description}"
                      placeholder="Enter product description. Each new line will be saved as a separate paragraph.">
            </textarea>

        </div>

        <div class="row g-3 mt-1">
            <div class="col-md-6">
                <label for="facebookUrl" class="form-label">Facebook URL (Optional)</label>
                <input class="form-control"
                       id="facebookUrl"
                       type="url"
                       th:field="*{facebookUrl}"
                       placeholder="https://facebook.com/...">
            </div>
            <div class="col-md-6">
                <label for="instagramUrl" class="form-label">Instagram URL (Optional)</label>
                <input class="form-control"
                       id="instagramUrl"
                       type="url"
                       th:field="*{instagramUrl}"
                       placeholder="https://instagram.com/...">
            </div>
        </div>

        <div class="form-check mt-3 mb-3">
            <input type="checkbox"
                   id="status"
                   th:field="*{status}"
                   class="form-check-input"/>
            <label for="status" class="form-check-label"> Active</label>
        </div>

        <div class="d-flex justify-content-end">
            <button type="submit" class="btn btn-primary">
                Save Product
            </button>
        </div>

    </form>
</div>

</body>
</html>
