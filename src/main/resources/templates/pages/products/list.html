<!DOCTYPE html>
<html th:replace="~{layout/index :: layout(~{::title}, ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${pageTitle}">Products</title>
</head>
<body>

<section>
    <div class="w3-container">

        <div class="w3-row w3-margin-top w3-margin-bottom">
            <div class="w3-col m6 s12">
                <h2 class="w3-margin-0">Products</h2>
                <div class="w3-small w3-text-grey">Create, view, edit, and delete products</div>
            </div>
            <div class="w3-col m6 s12" style="text-align:right; margin-top:8px">
                <button type="button" onclick="document.getElementById('addProductModal').style.display='block'"
                        class="w3-button w3-teal w3-round">Add Product
                </button>
            </div>
        </div>

        <div class="w3-card w3-padding table-tools w3-white w3-margin-bottom">
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                <select id="statusFilter" class="w3-select w3-border w3-round" style="max-width:180px">
                    <option value="">All statuses</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
            <div class="muted">
                <span>0</span> total
            </div>
        </div>

        <div class="w3-responsive">
            <table class="w3-table-all w3-card-4" id="productTable">
                <thead>
                <tr class="w3-teal">
                    <th>#</th>
                    <th style="width:100px;">Image</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Subcategory</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="product : ${products}">
                    <td th:text="${product.id}"></td>
                    <td>
                        <img alt="Product Image" class="product-thumbnail" th:src="@{${product.imageUrl}}" width="50" height="50"/>
                    </td>
                    <td>
                        <div class="w3-large" th:text="${product.text}">Product Title</div>
                    </td>
                    <td>
                        <div class="w3-large" th:text="${product.categoryName}">Category Name</div>
                    </td>
                    <td>
                        <div class="w3-large" th:text="${product.subCategoryName}">Subcategory Name</div>
                    </td>
                    <td>
                        <span th:text="${#numbers.formatCurrency(product.price)}">$0.00</span>
                    </td>
                    <td>
                        <span th:if="${product.status}" class="status-badge active">Active</span>
                        <span th:unless="${product.status}" class="status-badge inactive">Inactive</span>
                    </td>
                    <td class="actions">
                        <a th:href="@{/products/edit/{id}(id=${product.id})}"
                           class="w3-button w3-small w3-teal w3-round">Edit</a>

                        <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post"
                              onsubmit="return confirm('Are you sure you want to delete this product?');">
                            <button type="submit" class="w3-button w3-small w3-red w3-round">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${products.isEmpty()}">
                    <td colspan="8" class="w3-center w3-padding">
                        No products found.
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{pages/products/fragments/_add_modal :: add_modal}"></div>

</section>

</body>
</html>
