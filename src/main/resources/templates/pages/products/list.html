<!DOCTYPE html>
<html th:replace="~{layout/index :: layout(~{::title}, ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${pageTitle}">Products</title>
</head>
<body>

<section>
    <div class="container-fluid">

        <div class="row mt-3 mb-3 align-items-center">
            <div class="col-md-6 col-12">
                <h2 class="mb-0">Products</h2>
                <div class="small text-muted">Create, view, edit, and delete products</div>
            </div>
            <div class="col-md-6 col-12 text-md-end mt-2 mt-md-0">
                <button type="button" class="btn btn-success"
                        data-bs-toggle="modal" data-bs-target="#addProductModal">
                    Add Product
                </button>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-body d-flex flex-wrap align-items-center gap-2">
                <label for="statusFilter"></label><select id="statusFilter" class="form-select" style="max-width: 220px">
                    <option value="">All statuses</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
                <div class="text-muted ms-auto">
                    <span>0</span> total
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle" id="productTable">
                <thead class="table-primary">
                <tr>
                    <th>#</th>
                    <th style="width:100px;">Image</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Subcategory</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="product : ${products}">
                    <td th:text="${product.id}"></td>
                    <td>
                        <img alt="Product Image" class="img-thumbnail d-block" th:src="@{${product.imageUrl}}" width="50" height="50"/>
                    </td>
                    <td>
                        <div class="fw-semibold" th:text="${product.text}">Product Title</div>
                    </td>
                    <td>
                        <div class="fw-semibold" th:text="${product.categoryName}">Category Name</div>
                    </td>
                    <td>
                        <div class="fw-semibold" th:text="${product.subCategoryName}">Subcategory Name</div>
                    </td>
                    <td>
                        <span th:text="${#numbers.formatCurrency(product.price)}">$0.00</span>
                    </td>
                    <td>
                        <span th:if="${product.status}" class="badge bg-success">Active</span>
                        <span th:unless="${product.status}" class="badge bg-secondary">Inactive</span>
                    </td>
                    <td class="p-0">
                        <div class="d-flex align-items-center gap-2 text-nowrap h-100 px-3">
                            <a th:href="@{/products/edit/{id}(id=${product.id})}"
                               class="btn btn-sm btn-primary">Edit</a>

                            <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post"
                                  onsubmit="return confirm('Are you sure you want to delete this product?');">
                                <button type="submit" class="btn btn-sm btn-danger">
                                    Delete
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>

                <tr th:if="${products.isEmpty()}">
                    <td colspan="8" class="text-center p-3">
                        No products found.
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{pages/products/fragments/_add_modal :: add_modal}"></div>

</section>

</body>
</html>
