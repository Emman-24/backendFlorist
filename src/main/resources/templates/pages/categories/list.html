<!DOCTYPE html>
<html th:replace="~{layout/index :: layout(~{::title}, ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<body>
<section>
    <div class="container-fluid py-3">
        <div class="row align-items-center mb-3">
            <div class="col-md-6">
                <h2 class="h4 mb-1">Categories</h2>
                <div class="text-muted small">Create, view, edit, and delete categories and subcategories</div>
            </div>
            <div class="col-md-6 text-md-end mt-2 mt-md-0">
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCategoryModal">
                    Add Category
                </button>
            </div>
        </div>

        <div class="card mb-3">
            <div class="card-body d-flex gap-2 flex-wrap align-items-center table-tools">
                <label for="statusFilter"></label><select id="statusFilter" class="form-select" style="max-width: 200px;">
                    <option value="">All statuses</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
                <div class="ms-auto muted">
                    <span>0</span> total
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped align-middle" id="categoryTable">
                <thead class="table-light">
                <tr>
                    <th style="width:48px"></th>
                    <th style="width:60px">#</th>
                    <th>Name</th>
                    <th>Route</th>
                    <th style="width:140px">Status</th>
                    <th style="width:260px">Actions</th>
                </tr>
                </thead>
                <tbody>

                <tr th:each="category : ${categories}">
                    <td>
                        <!-- placeholder for future expand/collapse -->
                    </td>
                    <td th:text="${category.id}"></td>
                    <td>
                        <div class="fw-semibold" th:text="${category.text}"></div>
                    </td>
                    <td><code th:text="${category.route}"></code></td>
                    <td>
                        <span th:if="${category.status}" class="badge text-bg-success">Active</span>
                        <span th:unless="${category.status}" class="badge text-bg-secondary">Inactive</span>
                    </td>
                    <td class="text-nowrap">
                        <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-outline-secondary btn-sm">Edit</a>
                        <form th:action="@{/categories/delete/{id}(id=${category.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-danger btn-sm" onclick="return confirm('Are you sure you want to delete this category?');">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(categories)}">
                    <td colspan="6" class="text-center py-4 text-muted">No categories found</td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{pages/categories/fragments/_add_modal :: add_modal}"></div>

</section>
</body>
</html>
