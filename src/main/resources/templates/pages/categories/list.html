<!DOCTYPE html>
<html th:replace="~{layout/index :: layout(~{::title}, ~{::section})}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${pageTitle}">Categories</title>
</head>
<body>
<section>
    <div class="w3-container">
        <div class="w3-row w3-margin-top w3-margin-bottom">
            <div class="w3-col m6 s12">
                <h2 class="w3-margin-0">Categories</h2>
                <div class="w3-small w3-text-grey">Create, view, edit, and delete categories and subcategories</div>
            </div>
            <div class="w3-col m6 s12" style="text-align:right; margin-top:8px">
                <button type="button" onclick="document.getElementById('addCategoryModal').style.display='block'"
                        class="w3-button w3-teal w3-round">Add Category
                </button>
            </div>
        </div>

        <div class="w3-card w3-padding table-tools w3-white w3-margin-bottom">
            <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                <select id="statusFilter" class="w3-select w3-border w3-round" style="max-width:180px">
                    <option value="">All statuses</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
            </div>
            <div class="muted">
                <span>0</span> total
            </div>
        </div>

        <div class="w3-responsive">
            <table class="w3-table-all w3-card-4" id="categoryTable">
                <thead>
                <tr class="w3-teal">
                    <th style="width:48px"></th>
                    <th style="width:60px">#</th>
                    <th>Name</th>
                    <th>Route</th>
                    <th style="width:140px">Status</th>
                    <th style="width:260px">Actions</th>
                </tr>
                </thead>
                <tbody>

                <tr th:each="category : ${categories}">
                    <td>
                        <span class="caret" title="Show subcategories"></span>
                    </td>
                    <td th:text="${category.id}"></td>
                    <td>
                        <div class="w3-large" th:text="${category.text}"></div>
                    </td>
                    <td><code th:text="${category.route}"></code></td>
                    <td>
                        <span th:if="${category.status}" class="status-badge">Active</span>
                        <span th:unless="${category.status}" class="status-badge">Inactive</span>
                    </td>
                    <td class="actions">
                        <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn">Edit</a>
                        <form th:action="@{/categories/delete/{id}(id=${category.id})}" method="post"
                              style="display:inline;">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this category?');">
                                Delete
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(categories)}">
                    <td colspan="6" class="w3-center w3-padding-large w3-text-grey">No categories found</td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{pages/categories/fragments/_add_modal :: add_modal}"></div>

</section>
</body>
</html>
