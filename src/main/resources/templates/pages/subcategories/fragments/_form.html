<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="form_fields(formActionUrl)">

    <form method="post"
          th:action="${formActionUrl}"
          th:object="${subCategoryCreateRequest}">

        <div class="mb-3">
            <label for="text" class="form-label">Name</label>
            <input type="text" id="text" th:field="*{text}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="route" class="form-label">Route</label>
            <input type="text" id="route" th:field="*{route}" class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="category" class="form-label">Category</label>
            <select id="category" th:field="*{categoryId}" class="form-select">
                <option th:each="cat : ${categoriesForDropdown}"
                        th:value="${cat.id}"
                        th:text="${cat.text}">Category Name</option>
            </select>
        </div>

        <div class="form-check mb-3">
            <input type="checkbox" id="status" th:field="*{status}" class="form-check-input"/>
            <label class="form-check-label" for="status">Active</label>
        </div>

        <div class="border-top pt-3">
            <button type="submit" class="btn btn-primary float-end">Save Subcategory</button>
        </div>
    </form>
</div>

</body>
</html>
