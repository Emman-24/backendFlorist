<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Floristería Akasia Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>
<div class="login-card">

    <div class="text-center mb-4">
        <h2>Floristería Akasia</h2>
        <p class="text-muted">Panel de Administración</p>
    </div>

    <div class="alert alert-danger d-none" id="errorAlert">
        <strong>Error!</strong> <span id="errorMessage">Credenciales incorrectas.</span>
    </div>

    <div class="alert alert-success" th:if="${param.logout}">
        <strong>Éxito!</strong> Ha cerrado sesión correctamente.
    </div>

    <form id="loginForm">

        <div class="mb-3">
            <label for="username" class="form-label">Usuario</label>
            <input type="text" class="form-control" id="username" name="username" required>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="loginButton">Iniciar Sesión</button>

    </form>

</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        const loginButton = document.getElementById('loginButton');
        
        // Hide error alert
        errorAlert.classList.add('d-none');
        
        // Disable button during request
        loginButton.disabled = true;
        loginButton.textContent = 'Iniciando sesión...';
        
        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username, password })
            });
            
            if (response.ok) {
                const data = await response.json();
                
                // Store JWT token in cookie so JWTAuthenticationFilter can read it
                document.cookie = `accessToken=${data.accessToken}; path=/; max-age=${data.expiresIn}; SameSite=Strict`;
                document.cookie = `refreshToken=${data.refreshToken}; path=/; max-age=${60 * 60 * 24 * 7}; SameSite=Strict`;
                
                // Store user info in localStorage for UI purposes
                localStorage.setItem('user', JSON.stringify(data.user));
                
                // Redirect to dashboard
                window.location.href = '/';
            } else {
                // Show error
                errorMessage.textContent = 'Credenciales incorrectas.';
                errorAlert.classList.remove('d-none');
                loginButton.disabled = false;
                loginButton.textContent = 'Iniciar Sesión';
            }
        } catch (error) {
            console.error('Login error:', error);
            errorMessage.textContent = 'Error al conectar con el servidor.';
            errorAlert.classList.remove('d-none');
            loginButton.disabled = false;
            loginButton.textContent = 'Iniciar Sesión';
        }
    });
</script>
</body>
</html>
